<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Truck preview</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body { background: #fff; padding: 40px; font-family: var(--font-mono); }
  .grid { display: grid; gap: 24px; }
  .row { background: #f4f4f4; padding: 24px; }
  .row svg.truck { width: 100%; max-width: 700px; height: auto; color: #0F0F10; display:block; }
  .label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 12px; color: #666; }
  .dark { background: #0F0F10; }
  .dark .label { color: #999; }
  .dark .row svg.truck, .dark svg.truck { color: #fff; --hub: #0F0F10; }
  .sizes { display: flex; align-items: center; gap: 24px; padding: 24px; background: #f4f4f4; }
  .sizes svg.truck { color: #0F0F10; height: auto; }
  .s1 { width: 60px; }
  .s2 { width: 120px; }
  .s3 { width: 240px; }
  .s4 { width: 480px; }
</style>
</head>

<div class="grid">

  <div class="sizes">
